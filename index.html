<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Decade - Audiobook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .book-cover {
            width: 200px;
            height: 300px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 10px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
        }
        .book-title {
            font-size: 1.4em;
            font-weight: bold;
            line-height: 1.3;
        }
        .book-subtitle {
            font-size: 0.8em;
            margin-top: 10px;
            opacity: 0.9;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .author {
            text-align: center;
            color: #e94560;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .player-container {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        audio {
            width: 100%;
            height: 50px;
            border-radius: 10px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233,69,96,0.4);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #e94560;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 15px 0;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        .volume-control input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
        }
        .speed-control {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .speed-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .speed-btn.active {
            background: #e94560;
            border-color: #e94560;
        }
        .part-indicator {
            text-align: center;
            padding: 10px;
            background: rgba(233,69,96,0.2);
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85em;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="book-cover">
            <div>
                <div class="book-title">THE NEXT DECADE</div>
                <div class="book-subtitle">A Comprehensive Future Forecast</div>
            </div>
        </div>
        
        <h1>🎧 Audiobook</h1>
        <p class="author">Written by Shelly Gee
Concept by Joe Gomes</p>
        
        <div class="part-indicator" id="partIndicator">Part 1 of 4</div>
        
        <div class="player-container">
            <audio id="audioPlayer" controls>
                <source src="The_Next_Decade_Part1.mp3" type="audio/mpeg" id="audioSource">
                Your browser does not support the audio element.
            </audio>
            
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="time-display">
                <span id="currentTime">0:00:00</span>
                <span id="duration">0:00:00</span>
            </div>
            
            <div class="controls">
                <button class="btn" id="playBtn">▶ Play</button>
                <button class="btn btn-secondary" id="pauseBtn">⏸ Pause</button>
            </div>
            
            <div class="speed-control">
                <button class="speed-btn" data-speed="0.5">0.5x</button>
                <button class="speed-btn" data-speed="0.75">0.75x</button>
                <button class="speed-btn active" data-speed="1">1x</button>
                <button class="speed-btn" data-speed="1.25">1.25x</button>
                <button class="speed-btn" data-speed="1.5">1.5x</button>
                <button class="speed-btn" data-speed="2">2x</button>
            </div>
            
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="100">
            </div>
        </div>
        
        <div class="footer">
            <p>📚 Listen anywhere, anytime</p>
            <p style="margin-top:10px">Compatible with all devices</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedBtns = document.querySelectorAll('.speed-btn');
        const partIndicator = document.getElementById('partIndicator');
        
        let currentPart = 1;
        const totalParts = 4;
        const partFiles = [
            'The_Next_Decade_Part1.mp3',
            'The_Next_Decade_Part2.mp3',
            'The_Next_Decade_Part3.mp3',
            'The_Next_Decade_Part4.mp3'
        ];

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function loadPart(partNum) {
            currentPart = partNum;
            audioSource.src = partFiles[partNum - 1];
            audio.load();
            partIndicator.textContent = `Part ${partNum} of ${totalParts}`;
            playBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        playBtn.addEventListener('click', () => {
            audio.play();
            playBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
        });

        pauseBtn.addEventListener('click', () => {
            audio.pause();
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-block';
        });

        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = progress + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            if (currentPart < totalParts) {
                loadPart(currentPart + 1);
                audio.play();
            } else {
                playBtn.style.display = 'inline-block';
                pauseBtn.style.display = 'none';
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value / 100;
        });

        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                speedBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                audio.playbackRate = parseFloat(btn.dataset.speed);
            });
        });

        // Initialize
        pauseBtn.style.display = 'none';
    </script>
</body>
</html>
